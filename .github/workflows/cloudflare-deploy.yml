name: Full Stack Deploy

on:
  push:
    branches:
      - main
      - dev

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'development' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            staticSiteMarger/package-lock.json
            backend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install static site dependencies
        working-directory: staticSiteMarger
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_IS_DEV: ${{ vars.VITE_IS_DEV }}
        run: npm run build

      - name: Generate static site content
        working-directory: staticSiteMarger
        run: npm run build

      - name: Wrangler deploy
        working-directory: backend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ "${GITHUB_REF_NAME}" = "dev" ]; then
            npx wrangler deploy --env=dev --minify
          else
            npx wrangler deploy --minify
          fi
