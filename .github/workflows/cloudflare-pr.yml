name: Full Stack PR Checks

on:
  pull_request:
    branches:
      - "*"

permissions:
  checks: write
  contents: read
  pull-requests: write

jobs:
  validate:
    name: Build & Dry-run deploy
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            staticSiteMarger/package-lock.json
            backend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install static site dependencies
        working-directory: staticSiteMarger
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Generate static site content
        working-directory: staticSiteMarger
        run: npm run build

      - name: Wrangler dry-run deploy
        working-directory: backend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --minify --dry-run
