name: Full Stack Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy to production
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            staticSite/package-lock.json
            backend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Install static site dependencies
        working-directory: staticSite
        run: npm ci

      - name: Generate static site content
        working-directory: staticSite
        run: npx ts-node --esm main.ts

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Wrangler deploy
        working-directory: backend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run deploy

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Write Firebase service account
        run: |
          printf '%s' '${{ secrets.FIREBASE_SERVICE_ACCOUNT_MY_HISTORY_V2 }}' > ${HOME}/firebase-service-account.json

      - name: Deploy Firestore rules
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${HOME}/firebase-service-account.json
        run: firebase deploy --only firestore:rules --project my-history-v2 --non-interactive --force

      - name: Clean up credentials
        run: rm -f ${HOME}/firebase-service-account.json
